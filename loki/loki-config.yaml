auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9095

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    gcs:
      bucket_name: test-instance-loki-logs-bucket
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: gcs
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/index
    cache_location: /loki/index_cache
    cache_ttl: 24h

limits_config:
  retention_period: 7d
  # Allow Loki to ingest older logs if needed during migration
  reject_old_samples: true
  reject_old_samples_max_age: 168h

compactor:
  working_directory: /loki/retention
  compaction_interval: 10m
  retention_enabled: true
  # In v3, the compactor uses the storage defined in 'common'
  delete_request_store: gcs

ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  ring:
    kvstore:
      store: inmemory
