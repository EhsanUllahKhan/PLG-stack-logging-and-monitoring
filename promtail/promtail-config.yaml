server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/promtail-positions/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    external_labels:
      instance: "ai-logging-instance"

scrape_configs:
  # Capture logs from the Host machine (syslog/auth.log)
  - job_name: system
    static_configs:
    - targets:
        - localhost
      labels:
        job: varlogs
        instance: ai-logging-instance
        __path__: /var/log/*.log

  # Capture logs from all Docker containers on this VM
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'service_name'
    pipeline_stages:
      - drop:
          older_than: 1h
          drop_counter_reason: too_old
