services:
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
      - "3100:3100" # Exposing Loki port for remote VMs
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: always
    networks:
      - monitoring-net

  loki:
    image: grafana/loki:latest
    container_name: loki
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/etc/loki/gcp-creds.json
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml
      - ./loki/gcp-creds.json:/etc/loki/gcp-creds.json
      - loki-volume:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: always
    networks:
      - monitoring-net

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail/promtail-config.yaml:/etc/promtail/config.yml:ro
      - ./promtail/positions:/var/promtail-positions
    command: -config.file=/etc/promtail/config.yml
    restart: always
    networks:
      - monitoring-net

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    environment:
      - GF_SERVER_DOMAIN=my.dns.com
      - GF_SERVER_ROOT_URL=https://my.dns.com/
      - GF_SECURITY_ADMIN_PASSWORD=StrongP@ssword!23
      - GF_PLUGINS_PREINSTALL=grafana-clock-panel,grafana-piechart-panel
    volumes:
      - grafana-volume:/var/lib/grafana
    restart: always
    networks:
      - monitoring-net

volumes:
  loki-volume:
  grafana-volume:

networks:
  monitoring-net:
    driver: bridge
