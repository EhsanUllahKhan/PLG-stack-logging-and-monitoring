services:
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
      - "3100:3100" # Exposing Loki port for remote VMs
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: always
    networks:
      - monitoring-net

  loki:
    image: grafana/loki:latest
    container_name: loki
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/etc/loki/gcp-creds.json
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml
      - ./loki/gcp-creds.json:/etc/loki/gcp-creds.json
      - loki-volume:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: always
    networks:
      - monitoring-net

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail/promtail-config.yaml:/etc/promtail/config.yml:ro
      - ./promtail/positions:/var/promtail-positions
    command: -config.file=/etc/promtail/config.yml
    restart: always
    networks:
      - monitoring-net

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    environment:
      - GF_SERVER_DOMAIN=my.dns.com
      - GF_SERVER_ROOT_URL=https://my.dns.com/
      - GF_SECURITY_ADMIN_PASSWORD=StrongP@ssword!23
      - GF_PLUGINS_PREINSTALL=grafana-clock-panel,grafana-piechart-panel
    volumes:
      - grafana-volume:/var/lib/grafana
    restart: always
    networks:
      - monitoring-net

    # Run this service on target vm where you want to collect metrix
  node-exporter:
      image: prom/node-exporter:latest
      container_name: node-exporter
      restart: always
      pid: host
      network_mode: host
      volumes:
        - /proc:/host/proc:ro
        - /sys:/host/sys:ro
        - /:/rootfs:ro
      command:
        - '--path.procfs=/host/proc'
        - '--path.sysfs=/host/sys'
        - '--path.rootfs=/rootfs'
        - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      networks:
        - monitoring-net

  prometheus:
      image: prom/prometheus:latest
      container_name: prometheus
      volumes:
        - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
        - prometheus-volume:/prometheus
      command:
        - '--config.file=/etc/prometheus/prometheus.yml'
        - '--storage.tsdb.retention.time=30d'
      restart: always
      networks:
        - monitoring-net

volumes:
  loki-volume:
  grafana-volume:
  prometheus-volume:

networks:
  monitoring-net:
    driver: bridge
